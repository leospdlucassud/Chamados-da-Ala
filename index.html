<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#8B6B3D">
<title>Magnifique seu Chamado</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  /* ================= DESIGN "ESTILO LIAHONA" ================= */
  :root{
    --page:#F1ECDD; --bg:#FDFCF8; --panel:#FFFFFF; --panel-2:#FBF8F0;
    --line:#E7E0CF; --line-strong:#D8CEB4;
    --ink:#2C2A24; --ink-soft:#7A7059;
    --accent:#8B6B3D; --accent-soft:#B79A6A;
    --shadow:0 1px 2px rgba(60,50,20,.05), 0 1px 8px rgba(60,50,20,.04);
    --org:#8B6B3D;
    --maxw:460px;
  }
  html[data-theme="escuro"]{
    --page:#0E0C08; --bg:#16130E; --panel:#201C15; --panel-2:#1A1710;
    --line:#352F23; --line-strong:#463E2C;
    --ink:#ECE6D6; --ink-soft:#B0A487;
    --accent:#C7A567; --accent-soft:#9B8354;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--page); color:var(--ink);
    font-family:Georgia,"Times New Roman","Palatino Linotype",serif;
    font-size:16px; line-height:1.55;
    transition:background .2s,color .2s;
  }
  .app{
    max-width:var(--maxw); margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column; background:var(--bg);
  }
  /* Telas grandes: coluna de leitura emoldurada (parece deliberada) */
  @media (min-width:520px){
    .app{
      border-left:1px solid var(--line-strong); border-right:1px solid var(--line-strong);
      box-shadow:0 0 50px rgba(60,45,15,.10);
    }
    html[data-theme="escuro"] .app{ box-shadow:0 0 60px rgba(0,0,0,.5); }
  }

  /* ---------- Cabeçalho ---------- */
  header{
    position:sticky; top:0; z-index:20; background:var(--panel);
    border-bottom:1px solid var(--line-strong);
    padding:calc(8px + env(safe-area-inset-top,0)) 12px 10px;
    box-shadow:var(--shadow);
  }
  .h-row{display:flex; align-items:center; gap:8px; min-height:44px;}
  .btn-back{
    flex:0 0 auto; min-width:40px; height:40px; padding:0 11px;
    border:1px solid var(--line-strong); background:var(--panel-2);
    color:var(--ink); border-radius:8px; cursor:pointer;
    font-family:inherit; font-size:15px; display:none; align-items:center; gap:3px;
  }
  .btn-back:active{background:var(--line);}
  .btn-back .bk-ico{font-size:19px; line-height:1;}
  /* Em telas estreitas o botão Voltar fica só com o chevron, liberando o título */
  @media (max-width:379px){
    .btn-back{padding:0; width:40px; justify-content:center;}
    .btn-back .bk-txt{display:none;}
    .h-tools{gap:4px;}
    .tbtn{width:32px;}
  }
  .h-title{flex:1; min-width:0;}
  .h-title .t{font-weight:700; font-size:18px; line-height:1.2; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; letter-spacing:.01em;}
  .h-title .s{font-size:12.5px; color:var(--ink-soft); font-style:italic;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .h-tools{flex:0 0 auto; display:flex; gap:5px;}
  .tbtn{
    width:34px; height:34px; border-radius:8px; cursor:pointer;
    border:1px solid var(--line-strong); background:var(--panel-2);
    color:var(--ink); font-family:inherit; font-size:14px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .tbtn:active{background:var(--line);}
  .search{
    margin-top:9px; width:100%; height:42px; color:var(--ink);
    border:1px solid var(--line-strong); border-radius:10px; background:var(--panel-2);
    padding:0 14px; font-family:inherit; font-size:15px;
  }
  .search::placeholder{color:var(--ink-soft);}
  .search:focus{outline:2px solid var(--accent-soft); outline-offset:1px;}

  /* ---------- Conteúdo ---------- */
  main{flex:1; padding:14px 14px 24px;}
  .hint{font-size:13px; color:var(--ink-soft); font-style:italic; margin:2px 2px 14px;}

  .list{display:flex; flex-direction:column; gap:10px;}
  .card{
    display:flex; align-items:center; gap:13px; width:100%;
    min-height:58px; padding:13px 14px; text-align:left; cursor:pointer;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    color:var(--ink); font-family:inherit; box-shadow:var(--shadow);
    transition:transform .05s;
  }
  .card:active{transform:scale(.995); background:var(--panel-2);}
  .card .ico{
    flex:0 0 auto; width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:20px;
    background:color-mix(in srgb, var(--org) 12%, var(--panel));
    border:1px solid color-mix(in srgb, var(--org) 30%, var(--line));
  }
  .card .txt{flex:1; min-width:0;}
  .card .t{display:block; font-weight:700; font-size:16px; line-height:1.25;}
  .card .s{display:block; font-size:12.5px; color:var(--ink-soft); margin-top:2px; font-style:italic;}
  .card .chev{flex:0 0 auto; color:var(--accent-soft); font-size:20px;}

  .subhead{
    margin:20px 4px 9px; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--org); font-weight:700; font-family:system-ui,sans-serif;
    padding-left:9px; border-left:3px solid var(--org);
  }
  .subhead:first-child{margin-top:4px;}
  .empty{padding:30px 10px; text-align:center; color:var(--ink-soft); font-style:italic;}

  /* ---------- Tela de detalhe ---------- */
  .detail{max-width:100%;}
  .cover{
    margin:-14px -14px 18px; padding:26px 20px 22px;
    background:linear-gradient(160deg,
      color-mix(in srgb, var(--org) 10%, var(--panel)),
      var(--panel));
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .cover::after{content:""; position:absolute; left:20px; right:20px; bottom:14px; height:2px;
    background:linear-gradient(90deg, var(--accent), transparent);}
  .cover .org{font-size:12px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--org); font-family:system-ui,sans-serif; font-weight:700;}
  .cover h2{margin:6px 0 0; font-size:26px; line-height:1.2; font-weight:700;}
  .cover .escr{margin:12px 0 6px; font-style:italic; color:var(--ink-soft); font-size:15px;
    border-left:2px solid var(--accent-soft); padding-left:12px;}
  .cover .escr .ref{display:block; font-size:12px; margin-top:3px; font-style:normal; letter-spacing:.03em;}
  .cover.hasimg{padding:0; background:none;}
  .cover.hasimg img{width:100%; height:200px; object-fit:cover; display:block;}
  .cover.hasimg .capbar{padding:14px 18px 18px;
    background:linear-gradient(160deg, color-mix(in srgb, var(--org) 10%, var(--panel)), var(--panel));}

  .sec{margin:20px 0;}
  .sec > h3{
    margin:0 0 10px; font-size:12.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--org); font-weight:700; font-family:system-ui,sans-serif;
    display:flex; align-items:center; gap:9px;
  }
  .sec > h3::after{content:""; flex:1; height:1px; background:var(--line);}
  .sec p{margin:0 0 8px;}
  .ref-tag{display:inline-block; margin-top:4px; font-size:11.5px; color:var(--ink-soft);
    font-style:italic; font-family:system-ui,sans-serif;}
  ul.resp{list-style:none; margin:0; padding:0;}
  ul.resp li{position:relative; padding:5px 0 5px 20px;}
  ul.resp li::before{content:""; position:absolute; left:3px; top:12px; width:6px; height:6px;
    border-radius:50%; background:var(--accent);}

  .area{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:13px 15px; margin:12px 0; box-shadow:var(--shadow);
  }
  .area .num{
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:50%; font-size:13px; font-weight:700;
    background:color-mix(in srgb, var(--org) 16%, var(--panel));
    color:var(--org); border:1px solid color-mix(in srgb, var(--org) 34%, var(--line));
    font-family:system-ui,sans-serif; margin-right:9px; flex:0 0 auto;
  }
  .area .atit{display:flex; align-items:center; font-weight:700; font-size:16px; margin-bottom:8px;}
  .area ul{list-style:none; margin:0; padding:0;}
  .area li{position:relative; padding:4px 0 4px 18px; font-size:15px;}
  .area li::before{content:"›"; position:absolute; left:2px; top:4px; color:var(--accent-soft); font-weight:700;}

  .fecho{
    margin-top:16px; padding:16px 18px; border-radius:12px;
    background:var(--panel-2); border:1px solid var(--line);
    border-left:3px solid var(--accent);
  }
  .fecho p{margin:0; font-size:15.5px;}
  .fecho .fonte{display:block; margin-top:9px; font-size:12px; color:var(--ink-soft);
    font-style:italic; font-family:system-ui,sans-serif;}

  .prep{
    margin-top:22px; padding:22px 18px; text-align:center; border-radius:12px;
    background:var(--panel-2); border:1px dashed var(--line-strong); color:var(--ink-soft);
  }
  .prep b{color:var(--ink);}

  /* ---------- Rodapé ---------- */
  footer{
    padding:16px 14px calc(18px + env(safe-area-inset-bottom,0));
    border-top:1px solid var(--line); text-align:center;
    font-size:11px; color:var(--ink-soft); line-height:1.6;
    font-family:system-ui,sans-serif;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <button class="btn-back" id="btnBack" aria-label="Voltar"><span class="bk-ico">‹</span><span class="bk-txt">Voltar</span></button>
      <div class="h-title" id="hTitle">
        <div class="t">Magnifique seu Chamado</div>
        <div class="s">Guia de chamados da Ala</div>
      </div>
      <div class="h-tools">
        <button class="tbtn" id="fMinus" aria-label="Diminuir fonte">A−</button>
        <button class="tbtn" id="fPlus" aria-label="Aumentar fonte">A+</button>
        <button class="tbtn" id="themeBtn" aria-label="Alternar tema">☾</button>
      </div>
    </div>
    <input class="search" id="search" type="search" placeholder="Buscar chamado em todas as organizações…" autocomplete="off">
  </header>

  <main id="view"></main>

  <footer id="footer"></footer>
</div>

<script>
/* ==========================================================================
   MAGNIFIQUE SEU CHAMADO — FASE 2
   Design "estilo Liahona". Navegação SPA por estado em memória.
   Estrutura de dados pronta para receber o conteúdo de TODOS os chamados.
   Conteúdo fundamentado no Manual Geral (PT-BR). Nunca nominal (só o cargo).
   ========================================================================== */

const VERSAO = "1.4.0";
const DATA_STR = "20/07/2026";

const slug = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");

/* Helpers de construção -------------------------------------------------- */
// chamado só com título (estrutura pronta p/ receber conteúdo depois)
const t = titulo => ({ titulo });
// chamado com conteúdo completo
const full = (titulo, c) => ({ titulo, c });

/* ---- CONTEÚDO COMPLETO: BISPADO (amostra) ------------------------------ */
const BISPADO = [
  full("Bispo", {
    escritura:{ t:"Apascentai o rebanho de Deus que está entre vós… servindo de exemplo ao rebanho.", r:"1 Pedro 5:2–3" },
    proposito:"O bispo é o presidente da ala e o principal sumo sacerdote presidente. Recebe as chaves do sacerdócio para liderar o trabalho do Senhor na ala, preside o Sacerdócio Aarônico e o quórum de sacerdotes, e serve como juiz comum. Zela pelo bem-estar espiritual e temporal dos membros, com ênfase especial nos jovens e nas crianças.",
    ref:"Manual Geral, 7.1",
    resp:[
      "Presidir a ala e liderar o trabalho de salvação e exaltação por meio do conselho da ala (7.1.4).",
      "Presidir o Sacerdócio Aarônico e o quórum de sacerdotes, concentrando-se nos jovens (7.1.2).",
      "Servir como juiz comum: entrevistas de dignidade, recomendações para o templo e ajuda no arrependimento (7.1.3).",
      "Cuidar dos pobres e necessitados; administrar as ofertas de jejum e os recursos de bem-estar (7.1.4).",
      "Supervisionar registros, finanças e recursos sagrados da ala; aprovar chamados e desobrigações (7.1.5).",
      "Presidir a reunião sacramental, o conselho da ala e o comitê de jovens.",
    ],
    areas:[
      { t:"Ministrar como pastor", i:[
        "Reserve um tempo semanal fixo para entrevistas e para ministrar às pessoas.",
        "Procure conhecer pelo nome as famílias, os jovens e as crianças da ala.",
        "Assegure que ninguém fique sem ministros designados; acompanhe pelo conselho.",
      ]},
      { t:"Fortalecer os jovens", i:[
        "Reúna-se com regularidade com as presidências de quórum e de classe e deixe-as liderar.",
        "Participe das atividades dos jovens, do acampamento e do FSY sempre que possível.",
        "Cumpra rigorosamente a norma dos dois adultos responsáveis em toda interação com menores.",
      ]},
      { t:"Presidir por meio de conselhos", i:[
        "Prepare pautas centradas em pessoas — não apenas em programas e calendário.",
        "Delegue responsabilidades aos conselheiros e líderes, e confie neles.",
        "Busque revelação em conjunto, ouvindo com atenção cada membro do conselho.",
      ]},
      { t:"Cuidar do bem-estar", i:[
        "Ensine a autossuficiência antes de oferecer assistência da Igreja.",
        "Use as ofertas de jejum com oração e prudência, conforme a necessidade real.",
        "Envolva o quórum de élderes e a Sociedade de Socorro no cuidado das famílias.",
      ]},
      { t:"Preservar o tempo e a própria família", i:[
        "Delegue o máximo possível para proteger seu tempo pessoal e familiar.",
        "Priorize sua própria família e a santidade do Dia do Senhor.",
        "Renove-se espiritualmente cada dia pela oração e pelo estudo das escrituras.",
      ]},
    ],
    fecho:{ t:"O bispo é chamado a ser um pai amoroso para a ala, apontando sempre para o Salvador. Ao servir com amor puro e confiar no Senhor, verá suas forças serem magnificadas muito além das próprias.", f:"Manual Geral, cap. 7" },
  }),

  full("Primeiro Conselheiro no Bispado", {
    escritura:{ t:"E se um puder prevalecer contra outro, dois lhe resistirão.", r:"Eclesiastes 4:12" },
    proposito:"Serve sob a direção do bispo, ajudando-o a presidir a ala e cumprindo as designações que recebe. Os conselheiros não detêm as chaves do bispo, mas recebem autoridade delegada para supervisionar organizações e áreas de trabalho específicas.",
    ref:"Manual Geral, 7.1.1",
    resp:[
      "Auxiliar o bispo em suas responsabilidades e representá-lo quando designado.",
      "Supervisionar as organizações e áreas atribuídas pelo bispo (frequentemente a Escola Dominical, a missão da ala e outras designações).",
      "Participar do bispado, do conselho da ala e do comitê de jovens.",
      "Ajudar a coordenar o trabalho de salvação e exaltação, sem exercer funções que exijam as chaves do bispo.",
    ],
    areas:[
      { t:"Apoiar o bispo", i:[
        "Conheça as prioridades do bispo e ajude a aliviar sua carga.",
        "Mantenha comunicação frequente e leve a ele apenas o que exige as chaves.",
        "Prepare-se para presidir reuniões quando o bispo estiver ausente.",
      ]},
      { t:"Supervisionar as organizações designadas", i:[
        "Reúna-se com as presidências que supervisiona e conheça suas necessidades.",
        "Ajude-as a planejar e a manter o foco nas pessoas.",
        "Preste contas ao bispo sobre o andamento dessas organizações.",
      ]},
      { t:"Ministrar e cuidar", i:[
        "Cumpra com diligência suas próprias designações ministeriais.",
        "Participe dos assuntos de bem-estar conforme designado pelo bispo.",
        "Observe a norma dos dois adultos responsáveis com menores.",
      ]},
      { t:"Preparar-se e capacitar-se", i:[
        "Estude no Manual Geral os capítulos das áreas que supervisiona.",
        "Aproveite os treinamentos oferecidos pela estaca.",
        "Ajude a formar e apoiar os novos líderes das organizações.",
      ]},
      { t:"Guardar a unidade do bispado", i:[
        "Apoie plenamente as decisões tomadas em conselho.",
        "Fale a uma só voz com o bispo e o outro conselheiro.",
        "Guarde com fidelidade toda informação confidencial.",
      ]},
    ],
    fecho:{ t:"O conselheiro fiel multiplica a capacidade do bispado. Ao servir com lealdade e iniciativa, torna-se um verdadeiro sustentáculo no cuidado da ala.", f:"Manual Geral, cap. 7" },
  }),

  full("Segundo Conselheiro no Bispado", {
    escritura:{ t:"Ajudai-vos… levando as cargas uns dos outros, para que sejam leves.", r:"Mosias 18:8–9" },
    proposito:"Serve sob a direção do bispo, ajudando-o a presidir a ala e assumindo as designações que recebe. Como os demais conselheiros, apoia o bispo sem deter as chaves, supervisionando organizações e áreas específicas de trabalho.",
    ref:"Manual Geral, 7.1.1",
    resp:[
      "Auxiliar o bispo e representá-lo quando designado.",
      "Supervisionar as organizações atribuídas pelo bispo (frequentemente as Moças, a Primária ou os quóruns do Sacerdócio Aarônico).",
      "Participar do bispado, do conselho da ala e do comitê de jovens.",
      "Apoiar o trabalho de bem-estar e de salvação e exaltação conforme designado.",
    ],
    areas:[
      { t:"Apoiar o bispo", i:[
        "Assuma prontamente as designações recebidas, aliviando a carga do bispo.",
        "Mantenha o bispo informado do que ocorre nas áreas que supervisiona.",
        "Esteja preparado para servir sempre que for necessário.",
      ]},
      { t:"Zelar pelas crianças e jovens", i:[
        "Se supervisiona a Primária ou os jovens, reúna-se com suas presidências.",
        "Priorize a proteção das crianças e a norma dos dois adultos responsáveis.",
        "Incentive experiências espirituais nas aulas e atividades.",
      ]},
      { t:"Supervisionar as organizações designadas", i:[
        "Conheça as necessidades e os líderes de cada organização atribuída.",
        "Ajude no planejamento e na obtenção de recursos.",
        "Leve ao conselho da ala as necessidades que surgirem.",
      ]},
      { t:"Preparar-se", i:[
        "Estude os capítulos do Manual Geral referentes às suas áreas.",
        "Participe dos treinamentos de liderança.",
        "Apoie a formação de novos líderes.",
      ]},
      { t:"Guardar a unidade do bispado", i:[
        "Sustente as decisões do bispo e do bispado.",
        "Mantenha a confidencialidade em todos os assuntos.",
        "Cultive a harmonia e a confiança dentro do conselho.",
      ]},
    ],
    fecho:{ t:"Ao carregar parte da obra com alegria e lealdade, o segundo conselheiro permite que o bispado sirva a ala inteira com o amor do Salvador.", f:"Manual Geral, cap. 7" },
  }),

  full("Secretário Executivo da Ala", {
    escritura:{ t:"Que tudo seja feito com decência e ordem.", r:"1 Coríntios 14:40" },
    proposito:"Ajuda o bispado a coordenar o trabalho de liderança da ala, especialmente as reuniões do bispado, do conselho da ala e do comitê de jovens. Cuida das pautas, da agenda e do acompanhamento das designações — mas não é responsável pelos registros de membros nem pelas finanças.",
    ref:"Manual Geral, 7.3",
    resp:[
      "Ajudar o bispado a preparar as pautas e a agendar as reuniões de liderança.",
      "Programar as entrevistas e as designações do bispado.",
      "Acompanhar as atribuições feitas nos conselhos e lembrar os responsáveis.",
      "Coordenar o calendário e o planejamento geral da ala.",
      "Treinar e coordenar os secretários executivos adjuntos.",
    ],
    areas:[
      { t:"Organizar reuniões produtivas", i:[
        "Envie a pauta com antecedência e ajude a mantê-la centrada nas pessoas.",
        "Ajude o bispado a começar e a terminar as reuniões no horário.",
        "Garanta que os assuntos certos cheguem ao conselho certo.",
      ]},
      { t:"Gerir a agenda do bispado", i:[
        "Proteja o tempo do bispo, evitando sobreposições de compromissos.",
        "Confirme entrevistas e avise os membros com clareza e antecedência.",
        "Mantenha uma agenda simples, atualizada e acessível ao bispado.",
      ]},
      { t:"Acompanhar as designações", i:[
        "Registre quem ficou responsável por cada atribuição do conselho.",
        "Dê seguimento com lembretes gentis antes da reunião seguinte.",
        "Relate ao bispado o andamento das designações em aberto.",
      ]},
      { t:"Coordenar o calendário da ala", i:[
        "Integre os calendários das organizações e evite conflitos de datas.",
        "Ajude a planejar com antecedência as atividades e conferências.",
        "Comunique as datas aprovadas a todos os líderes.",
      ]},
      { t:"Servir nos bastidores", i:[
        "Antecipe as necessidades do bispado antes que sejam pedidas.",
        "Guarde absoluta confidencialidade sobre o que ouve nas reuniões.",
        "Prepare e capacite um adjunto para dar continuidade ao trabalho.",
      ]},
    ],
    fecho:{ t:"Servindo com ordem e discrição, o secretário executivo libera o bispado para dedicar-se ao que mais importa: ministrar às pessoas.", f:"Manual Geral, cap. 7" },
  }),

  full("Secretário Executivo Assistente da Ala", {
    proposito:"Apoia o secretário executivo da ala na coordenação das reuniões de liderança, na agenda do bispado e no acompanhamento das designações, substituindo-o quando necessário. Como o secretário executivo, não cuida de registros de membros nem de finanças.",
    ref:"Manual Geral, 7.3",
    resp:[
      "Auxiliar na preparação de pautas e no agendamento das reuniões.",
      "Ajudar a programar entrevistas e designações do bispado.",
      "Dar seguimento às atribuições feitas nos conselhos.",
      "Assumir as funções do secretário executivo em sua ausência.",
    ],
    areas:[
      { t:"Dar apoio constante", i:[
        "Combine com o secretário executivo a divisão das tarefas.",
        "Esteja pronto para assumir quando ele estiver ausente.",
        "Mantenha-se a par das reuniões e designações em andamento.",

/* ---- Pós-processamento: ids estáveis + índice de busca ----------------- */
const INDEX = [];
ORGS.forEach(org=>{
  let n = 0;
  const reg = (c, grupo)=>{
    c.id = org.id + "-" + (n++);
    c.orgId = org.id; c.orgNome = org.nome; c.orgIcone = org.icone; c.grupo = grupo || null;
    INDEX.push(c);
  };
  if(org.chamados) org.chamados.forEach(c=>reg(c,null));
  if(org.grupos) org.grupos.forEach(g=>g.chamados.forEach(c=>reg(c,g.nome)));
});
const findOrg = id => ORGS.find(o=>o.id===id);
const findChamado = id => INDEX.find(c=>c.id===id);

/* ==========================================================================
   PREFERÊNCIAS (localStorage com try/catch — só tema e tamanho de fonte)
   ========================================================================== */
const ZOOMS = [0.9, 1.0, 1.12, 1.28];
let prefs = { tema:"claro", zoomIdx:1 };
try{
  const raw = localStorage.getItem("mag_prefs");
  if(raw){ const p=JSON.parse(raw); if(p.tema) prefs.tema=p.tema; if(Number.isInteger(p.zoomIdx)) prefs.zoomIdx=p.zoomIdx; }
}catch(e){}
function savePrefs(){ try{ localStorage.setItem("mag_prefs", JSON.stringify(prefs)); }catch(e){} }
function applyPrefs(){
  document.documentElement.setAttribute("data-theme", prefs.tema);
  document.body.style.zoom = ZOOMS[prefs.zoomIdx];
  document.getElementById("themeBtn").textContent = prefs.tema==="escuro" ? "☀" : "☾";
  document.querySelector('meta[name=theme-color]').setAttribute("content",
    prefs.tema==="escuro" ? "#201C15" : "#8B6B3D");
}

/* ==========================================================================
   NAVEGAÇÃO (estado em memória — sem reload)
   ========================================================================== */
let state = { view:"home", orgId:null, chamadoId:null, cameFromSearch:false };
const el = {
  view: document.getElementById("view"),
  back: document.getElementById("btnBack"),
  hT: document.querySelector("#hTitle .t"),
  hS: document.querySelector("#hTitle .s"),
  search: document.getElementById("search"),
  footer: document.getElementById("footer"),
};
function go(next){ state = { ...state, ...next }; render(); window.scrollTo(0,0); }
function setHeader(t2, s2){ el.hT.textContent=t2; el.hS.textContent=s2||""; }
function setOrgColor(cor){ document.documentElement.style.setProperty("--org", cor || "var(--accent)"); }

function render(){
  el.footer.textContent = `v${VERSAO} · ${DATA_STR} · © 2026 Léo Lucas · Todos os direitos reservados`;
  const q = el.search.value.trim();
  if(q){ el.back.style.display="none"; setOrgColor(null); return renderBusca(q); }
  if(state.view==="home") return renderHome();
  if(state.view==="org") return renderOrg();
  if(state.view==="detalhe") return renderDetalhe();
}

/* NÍVEL 1 — HOME */
function renderHome(){
  el.back.style.display="none"; setOrgColor(null);
  setHeader("Magnifique seu Chamado","Guia de chamados da Ala");
  el.view.innerHTML="";
  el.view.appendChild(hint("Toque numa organização ou use a busca acima."));
  const cards = ORGS.map((org,i)=>{
    const n = org.chamados ? org.chamados.length : org.grupos.reduce((a,g)=>a+g.chamados.length,0);
    return card(org.icone, `${i+1}. ${org.nome}`, `${n} chamado${n!==1?"s":""}`, org.cor,
      ()=>go({view:"org",orgId:org.id}));
  });
  el.view.appendChild(listWrap(cards));
}

/* NÍVEL 2 — SUBMENU DA ORGANIZAÇÃO */
function renderOrg(){
  const org = findOrg(state.orgId);
  setOrgColor(org.cor);
  el.back.style.display="flex"; el.back.onclick=()=>go({view:"home",orgId:null});
  setHeader(org.nome,"Escolha um chamado");
  el.view.innerHTML="";
  const mk = c => card("›", c.titulo, c.c? null : "conteúdo em preparação", org.cor,
    ()=>go({view:"detalhe",orgId:org.id,chamadoId:c.id,cameFromSearch:false}), true);
  if(org.chamados){
    el.view.appendChild(listWrap(org.chamados.map(mk)));
  } else {
    org.grupos.forEach(g=>{
      const h=document.createElement("div"); h.className="subhead"; h.textContent=g.nome;
      el.view.appendChild(h);
      el.view.appendChild(listWrap(g.chamados.map(mk)));
    });
  }
}

/* NÍVEL 3 — DETALHE */
function renderDetalhe(){
  const c = findChamado(state.chamadoId);
  const org = findOrg(c.orgId);
  setOrgColor(org.cor);
  el.back.style.display="flex";
  el.back.onclick = state.cameFromSearch
    ? ()=>{ el.search.value=""; go({view:"home",orgId:null,chamadoId:null}); }
    : ()=>go({view:"org",orgId:c.orgId,chamadoId:null});
  setHeader(c.titulo, org.nome + (c.grupo? " · "+c.grupo : ""));
  el.view.innerHTML="";

  const wrap=document.createElement("div"); wrap.className="detail";

  // Cabeçalho tipográfico (ou foto, se houver c.foto)
  const cover=document.createElement("div"); cover.className="cover";
  const escrHtml = c.c && c.c.escritura
    ? `<div class="escr">“${c.c.escritura.t}”<span class="ref">— ${c.c.escritura.r}</span></div>` : "";
  if(c.foto){
    cover.classList.add("hasimg");
    cover.innerHTML=`<img src="${c.foto}" alt="">
      <div class="capbar"><div class="org">${org.nome}${c.grupo? " · "+c.grupo : ""}</div>
      <h2>${c.titulo}</h2>${escrHtml}</div>`;
  } else {
    cover.innerHTML=`<div class="org">${org.nome}${c.grupo? " · "+c.grupo : ""}</div>
      <h2>${c.titulo}</h2>${escrHtml}`;
  }
  wrap.appendChild(cover);

  if(!c.c){
    wrap.appendChild(node(`<div class="prep"><b>Conteúdo em preparação.</b><br>
      A estrutura deste chamado já está pronta e será preenchida em breve,
      com base no <i>Manual Geral</i>.</div>`));
    el.view.appendChild(wrap); return;
  }

  const d = c.c;
  // Propósito
  const sp = section("Propósito");
  sp.appendChild(node(`<p>${d.proposito}</p>`));
  if(d.ref) sp.appendChild(node(`<span class="ref-tag">${d.ref}</span>`));
  wrap.appendChild(sp);

  // Responsabilidades
  const sr = section("Responsabilidades");
  const ul=document.createElement("ul"); ul.className="resp";
  d.resp.forEach(r=>{ const li=document.createElement("li"); li.innerHTML=r; ul.appendChild(li); });
  sr.appendChild(ul); wrap.appendChild(sr);

  // Como magnificar (5 áreas)
  const sm = section("Como magnificar seu chamado");
  d.areas.forEach((a,i)=>{
    const box=document.createElement("div"); box.className="area";
    const head=document.createElement("div"); head.className="atit";
    head.innerHTML=`<span class="num">${i+1}</span><span></span>`;
    head.querySelector("span:last-child").textContent=a.t;
    box.appendChild(head);
    const uli=document.createElement("ul");
    a.i.forEach(x=>{ const li=document.createElement("li"); li.textContent=x; uli.appendChild(li); });
    box.appendChild(uli); sm.appendChild(box);
  });
  wrap.appendChild(sm);

  // Fechamento
  const sf=document.createElement("div"); sf.className="sec";
  sf.innerHTML=`<h3>Fechamento</h3>
    <div class="fecho"><p>${d.fecho.t}</p><span class="fonte">${d.fecho.f}</span></div>`;
  wrap.appendChild(sf);

  el.view.appendChild(wrap);
}

/* BUSCA — leva direto ao Nível 3 */
function renderBusca(q){
  setHeader("Resultados da busca","“"+q+"”");
  const nq = slug(q);
  const res = INDEX.filter(c=>slug(c.titulo).includes(nq) || slug(c.orgNome).includes(nq));
  el.view.innerHTML="";
  if(!res.length){ el.view.appendChild(node(`<div class="empty">Nenhum chamado encontrado para “${q}”.</div>`)); return; }
  el.view.appendChild(hint(`${res.length} resultado${res.length!==1?"s":""}.`));
  el.view.appendChild(listWrap(res.map(c=>{
    const org=findOrg(c.orgId);
    const sub=c.orgNome+(c.grupo? " · "+c.grupo : "");
    return card(c.orgIcone, c.titulo, sub, org.cor, ()=>{ el.search.value="";
      go({view:"detalhe",orgId:c.orgId,chamadoId:c.id,cameFromSearch:true}); });
  })));
}

/* ---- Helpers de UI ---- */
function card(ico, titulo, sub, cor, onClick, plainIco){
  const b=document.createElement("button"); b.className="card";
  if(cor) b.style.setProperty("--org", cor);
  b.innerHTML=`<span class="ico">${ico}</span>
    <span class="txt"><span class="t"></span>${sub?'<span class="s"></span>':''}</span>
    <span class="chev">›</span>`;
  b.querySelector(".t").textContent=titulo;
  if(sub) b.querySelector(".s").textContent=sub;
  if(plainIco){ const ic=b.querySelector(".ico"); ic.style.background="transparent"; ic.style.border="none"; ic.style.color="var(--accent-soft)"; }
  b.onclick=onClick; return b;
}
function listWrap(cards){ const d=document.createElement("div"); d.className="list"; cards.forEach(c=>d.appendChild(c)); return d; }
function section(titulo){ const s=document.createElement("div"); s.className="sec"; const h=document.createElement("h3"); h.textContent=titulo; s.appendChild(h); return s; }
function hint(txt){ const p=document.createElement("p"); p.className="hint"; p.textContent=txt; return p; }
function node(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstElementChild; }

/* ---- Eventos ---- */
el.search.addEventListener("input", render);
document.getElementById("themeBtn").onclick=()=>{ prefs.tema = prefs.tema==="escuro"?"claro":"escuro"; applyPrefs(); savePrefs(); };
document.getElementById("fPlus").onclick=()=>{ if(prefs.zoomIdx<ZOOMS.length-1){ prefs.zoomIdx++; applyPrefs(); savePrefs(); } };
document.getElementById("fMinus").onclick=()=>{ if(prefs.zoomIdx>0){ prefs.zoomIdx--; applyPrefs(); savePrefs(); } };

/* ---- Service Worker ---- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

applyPrefs();
render();
</script>
