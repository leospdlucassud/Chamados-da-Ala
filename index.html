<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#8B6B3D">
<title>Magnifique seu Chamado</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  /* ================= DESIGN "ESTILO LIAHONA" ================= */
  :root{
    --page:#F1ECDD; --bg:#FDFCF8; --panel:#FFFFFF; --panel-2:#FBF8F0;
    --line:#E7E0CF; --line-strong:#D8CEB4;
    --ink:#2C2A24; --ink-soft:#7A7059;
    --accent:#8B6B3D; --accent-soft:#B79A6A;
    --shadow:0 1px 2px rgba(60,50,20,.05), 0 1px 8px rgba(60,50,20,.04);
    --org:#8B6B3D;
    --maxw:460px;
  }
  html[data-theme="escuro"]{
    --page:#0E0C08; --bg:#16130E; --panel:#201C15; --panel-2:#1A1710;
    --line:#352F23; --line-strong:#463E2C;
    --ink:#ECE6D6; --ink-soft:#B0A487;
    --accent:#C7A567; --accent-soft:#9B8354;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--page); color:var(--ink);
    font-family:Georgia,"Times New Roman","Palatino Linotype",serif;
    font-size:16px; line-height:1.55;
    transition:background .2s,color .2s;
  }
  .app{
    max-width:var(--maxw); margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column; background:var(--bg);
  }
  /* Telas grandes: coluna de leitura emoldurada (parece deliberada) */
  @media (min-width:520px){
    .app{
      border-left:1px solid var(--line-strong); border-right:1px solid var(--line-strong);
      box-shadow:0 0 50px rgba(60,45,15,.10);
    }
    html[data-theme="escuro"] .app{ box-shadow:0 0 60px rgba(0,0,0,.5); }
  }

  /* ---------- Cabeçalho ---------- */
  header{
    position:sticky; top:0; z-index:20; background:var(--panel);
    border-bottom:1px solid var(--line-strong);
    padding:calc(8px + env(safe-area-inset-top,0)) 12px 10px;
    box-shadow:var(--shadow);
  }
  .h-row{display:flex; align-items:center; gap:8px; min-height:44px;}
  .btn-back{
    flex:0 0 auto; min-width:40px; height:40px; padding:0 11px;
    border:1px solid var(--line-strong); background:var(--panel-2);
    color:var(--ink); border-radius:8px; cursor:pointer;
    font-family:inherit; font-size:15px; display:none; align-items:center; gap:3px;
  }
  .btn-back:active{background:var(--line);}
  .btn-back .bk-ico{font-size:19px; line-height:1;}
  /* Em telas estreitas o botão Voltar fica só com o chevron, liberando o título */
  @media (max-width:379px){
    .btn-back{padding:0; width:40px; justify-content:center;}
    .btn-back .bk-txt{display:none;}
    .h-tools{gap:4px;}
    .tbtn{width:32px;}
  }
  .h-title{flex:1; min-width:0;}
  .h-title .t{font-weight:700; font-size:18px; line-height:1.2; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; letter-spacing:.01em;}
  .h-title .s{font-size:12.5px; color:var(--ink-soft); font-style:italic;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .h-tools{flex:0 0 auto; display:flex; gap:5px;}
  .tbtn{
    width:34px; height:34px; border-radius:8px; cursor:pointer;
    border:1px solid var(--line-strong); background:var(--panel-2);
    color:var(--ink); font-family:inherit; font-size:14px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .tbtn:active{background:var(--line);}
  .search{
    margin-top:9px; width:100%; height:42px; color:var(--ink);
    border:1px solid var(--line-strong); border-radius:10px; background:var(--panel-2);
    padding:0 14px; font-family:inherit; font-size:15px;
  }
  .search::placeholder{color:var(--ink-soft);}
  .search:focus{outline:2px solid var(--accent-soft); outline-offset:1px;}

  /* ---------- Conteúdo ---------- */
  main{flex:1; padding:14px 14px 24px;}
  .hint{font-size:13px; color:var(--ink-soft); font-style:italic; margin:2px 2px 14px;}

  .list{display:flex; flex-direction:column; gap:10px;}
  .card{
    display:flex; align-items:center; gap:13px; width:100%;
    min-height:58px; padding:13px 14px; text-align:left; cursor:pointer;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    color:var(--ink); font-family:inherit; box-shadow:var(--shadow);
    transition:transform .05s;
  }
  .card:active{transform:scale(.995); background:var(--panel-2);}
  .card .ico{
    flex:0 0 auto; width:40px; height:40px; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:20px;
    background:color-mix(in srgb, var(--org) 12%, var(--panel));
    border:1px solid color-mix(in srgb, var(--org) 30%, var(--line));
  }
  .card .txt{flex:1; min-width:0;}
  .card .t{display:block; font-weight:700; font-size:16px; line-height:1.25;}
  .card .s{display:block; font-size:12.5px; color:var(--ink-soft); margin-top:2px; font-style:italic;}
  .card .chev{flex:0 0 auto; color:var(--accent-soft); font-size:20px;}

  .subhead{
    margin:20px 4px 9px; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--org); font-weight:700; font-family:system-ui,sans-serif;
    padding-left:9px; border-left:3px solid var(--org);
  }
  .subhead:first-child{margin-top:4px;}
  .empty{padding:30px 10px; text-align:center; color:var(--ink-soft); font-style:italic;}

  /* ---------- Tela de detalhe ---------- */
  .detail{max-width:100%;}
  .cover{
    margin:-14px -14px 18px; padding:26px 20px 22px;
    background:linear-gradient(160deg,
      color-mix(in srgb, var(--org) 10%, var(--panel)),
      var(--panel));
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .cover::after{content:""; position:absolute; left:20px; right:20px; bottom:14px; height:2px;
    background:linear-gradient(90deg, var(--accent), transparent);}
  .cover .org{font-size:12px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--org); font-family:system-ui,sans-serif; font-weight:700;}
  .cover h2{margin:6px 0 0; font-size:26px; line-height:1.2; font-weight:700;}
  .cover .escr{margin:12px 0 6px; font-style:italic; color:var(--ink-soft); font-size:15px;
    border-left:2px solid var(--accent-soft); padding-left:12px;}
  .cover .escr .ref{display:block; font-size:12px; margin-top:3px; font-style:normal; letter-spacing:.03em;}
  .cover.hasimg{padding:0; background:none;}
  .cover.hasimg img{width:100%; height:200px; object-fit:cover; display:block;}
  .cover.hasimg .capbar{padding:14px 18px 18px;
    background:linear-gradient(160deg, color-mix(in srgb, var(--org) 10%, var(--panel)), var(--panel));}

  .sec{margin:20px 0;}
  .sec > h3{
    margin:0 0 10px; font-size:12.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--org); font-weight:700; font-family:system-ui,sans-serif;
    display:flex; align-items:center; gap:9px;
  }
  .sec > h3::after{content:""; flex:1; height:1px; background:var(--line);}
  .sec p{margin:0 0 8px;}
  .ref-tag{display:inline-block; margin-top:4px; font-size:11.5px; color:var(--ink-soft);
    font-style:italic; font-family:system-ui,sans-serif;}
  ul.resp{list-style:none; margin:0; padding:0;}
  ul.resp li{position:relative; padding:5px 0 5px 20px;}
  ul.resp li::before{content:""; position:absolute; left:3px; top:12px; width:6px; height:6px;
    border-radius:50%; background:var(--accent);}

  .area{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:13px 15px; margin:12px 0; box-shadow:var(--shadow);
  }
  .area .num{
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:50%; font-size:13px; font-weight:700;
    background:color-mix(in srgb, var(--org) 16%, var(--panel));
    color:var(--org); border:1px solid color-mix(in srgb, var(--org) 34%, var(--line));
    font-family:system-ui,sans-serif; margin-right:9px; flex:0 0 auto;
  }
  .area .atit{display:flex; align-items:center; font-weight:700; font-size:16px; margin-bottom:8px;}
  .area ul{list-style:none; margin:0; padding:0;}
  .area li{position:relative; padding:4px 0 4px 18px; font-size:15px;}
  .area li::before{content:"›"; position:absolute; left:2px; top:4px; color:var(--accent-soft); font-weight:700;}

  .fecho{
    margin-top:16px; padding:16px 18px; border-radius:12px;
    background:var(--panel-2); border:1px solid var(--line);
    border-left:3px solid var(--accent);
  }
  .fecho p{margin:0; font-size:15.5px;}
  .fecho .fonte{display:block; margin-top:9px; font-size:12px; color:var(--ink-soft);
    font-style:italic; font-family:system-ui,sans-serif;}

  .prep{
    margin-top:22px; padding:22px 18px; text-align:center; border-radius:12px;
    background:var(--panel-2); border:1px dashed var(--line-strong); color:var(--ink-soft);
  }
  .prep b{color:var(--ink);}

  /* ---------- Rodapé ---------- */
  footer{
    padding:16px 14px calc(18px + env(safe-area-inset-bottom,0));
    border-top:1px solid var(--line); text-align:center;
    font-size:11px; color:var(--ink-soft); line-height:1.6;
    font-family:system-ui,sans-serif;
  }

  /* ======================================================================
     REFINAMENTO VISUAL (v1.6) — mais elegante e detalhado
     ====================================================================== */
  :root{ --serif:Georgia,"Times New Roman","Palatino Linotype",serif;
         --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  body{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }

  /* Links externos (Manual e escrituras) */
  a.ext{ color:var(--org); text-decoration:none; font-style:normal; white-space:nowrap;
    border-bottom:1px solid color-mix(in srgb, var(--org) 38%, transparent); padding-bottom:1px;
    transition:background .12s,border-color .12s; }
  a.ext::after{ content:"↗"; font-size:.72em; margin-left:2px; vertical-align:.15em; opacity:.6; }
  a.ext:hover{ border-bottom-color:var(--org);
    background:color-mix(in srgb, var(--org) 9%, transparent); }

  /* ---- HERO da home ---- */
  .hero{ text-align:center; padding:24px 16px 6px; margin:-14px -14px 10px;
    background:radial-gradient(120% 80% at 50% 0%, color-mix(in srgb, var(--accent) 9%, var(--bg)), var(--bg)); }
  .hero .mark{ font-size:24px; color:var(--accent); line-height:1; }
  .hero h1{ font-family:var(--serif); font-size:26px; font-weight:700; margin:8px 0 4px; letter-spacing:.01em; }
  .hero .sub{ font-size:13px; color:var(--ink-soft); font-style:italic; max-width:300px; margin:0 auto; }
  .orn{ display:flex; align-items:center; justify-content:center; gap:12px;
    color:var(--accent-soft); margin:14px auto 2px; max-width:210px; }
  .orn::before,.orn::after{ content:""; height:1px; flex:1; }
  .orn::before{ background:linear-gradient(90deg,transparent,var(--line-strong)); }
  .orn::after{ background:linear-gradient(90deg,var(--line-strong),transparent); }
  .orn .d{ font-size:11px; }

  /* ---- Cartões: pílula de contagem + hover em telas grandes ---- */
  .card .s2{ display:block; margin-top:5px; }
  .card .count{ display:inline-block; font-family:var(--sans); font-size:11px; font-weight:700;
    color:var(--org); background:color-mix(in srgb, var(--org) 12%, var(--panel));
    border:1px solid color-mix(in srgb, var(--org) 26%, var(--line));
    border-radius:999px; padding:2px 9px; }
  @media (hover:hover){
    .card{ transition:transform .13s, box-shadow .13s, border-color .13s; }
    .card:hover{ transform:translateY(-1px);
      border-color:color-mix(in srgb, var(--org) 36%, var(--line));
      box-shadow:0 5px 16px rgba(60,45,15,.11); }
    html[data-theme="escuro"] .card:hover{ box-shadow:0 5px 16px rgba(0,0,0,.4); }
  }

  /* ---- Capa do detalhe ---- */
  .cover{ margin-bottom:6px; padding-bottom:26px; }
  .cover .kicker{ display:inline-block; font-family:var(--sans); font-size:11px; font-weight:700;
    letter-spacing:.13em; text-transform:uppercase; color:var(--org);
    background:color-mix(in srgb, var(--org) 10%, var(--panel));
    border:1px solid color-mix(in srgb, var(--org) 24%, var(--line));
    border-radius:999px; padding:4px 11px; }
  .cover h2{ font-size:28px; margin-top:11px; letter-spacing:.005em; }
  .cover .escr{ border-left:none; padding-left:0; margin:16px 0 0; font-size:15.5px; line-height:1.5; }
  .cover .escr .qm{ font-family:var(--serif); font-size:34px; color:var(--accent-soft);
    line-height:0; vertical-align:-14px; margin-right:1px; opacity:.7; }
  .cover .escr .ref{ margin-top:7px; font-size:12.5px; }

  /* ---- Seções com ícone ---- */
  .sec > h3 .ic{ color:var(--org); font-size:13px; opacity:.9; }
  .sec > h3 .lbl{ white-space:nowrap; }
  .sec.proposito p{ font-size:16.5px; line-height:1.6; }
  .ref-tag{ display:inline-flex; align-items:center; gap:5px; background:var(--panel-2);
    border:1px solid var(--line); border-radius:999px; padding:4px 11px; font-style:normal;
    font-size:12px; margin-top:8px; }
  .ref-tag .ic{ font-size:12px; }

  /* ---- Responsabilidades com check dourado ---- */
  ul.resp li{ padding:6px 0 6px 26px; }
  ul.resp li::before{ content:"✓"; background:none; border-radius:0; width:auto; height:auto;
    top:6px; left:3px; color:var(--org); font-weight:700; font-size:14px; }

  /* ---- Áreas práticas ---- */
  .area{ border-left:3px solid color-mix(in srgb, var(--org) 55%, var(--line));
    transition:box-shadow .13s; }
  @media (hover:hover){ .area:hover{ box-shadow:0 4px 14px rgba(60,45,15,.09); } }
  .area .atit{ align-items:flex-start; }
  .area .atxt{ padding-top:1px; }
  .area .num{ background:var(--org); color:#fff; border:none; box-shadow:0 1px 3px rgba(0,0,0,.15); }

  /* ---- Fechamento como testemunho ---- */
  .fecho{ position:relative; padding-top:20px; }
  .fecho::before{ content:"“"; position:absolute; top:6px; left:12px; font-family:var(--serif);
    font-size:44px; line-height:1; color:color-mix(in srgb, var(--org) 32%, transparent); }
  .fecho p{ padding-left:24px; }
  .fecho .fonte{ padding-left:24px; }

  /* ---- Rodapé com fio dourado ---- */
  footer{ position:relative; }
  footer::before{ content:""; position:absolute; top:-1px; left:50%; transform:translateX(-50%);
    width:60px; height:2px; background:linear-gradient(90deg,transparent,var(--accent-soft),transparent); }

  /* ---- Favoritos na Home ---- */
  .fav-toggle .ico{ color:var(--accent) !important; }

  /* ---- Barra de ações no detalhe (Favoritar / Compartilhar / Imprimir) ---- */
  .actbar{ display:flex; gap:8px; margin:14px 0 4px; }
  .actbar button{
    flex:1; min-height:42px; padding:0 10px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
    border:1px solid var(--line-strong); background:var(--panel-2); color:var(--ink);
    border-radius:10px; font-family:inherit; font-size:14px; font-weight:700;
  }
  .actbar button:active{ background:var(--line); }
  .actbar button .ai{ font-size:16px; line-height:1; }
  .actbar button.on{ background:color-mix(in srgb, var(--accent) 14%, var(--panel));
    border-color:var(--accent-soft); color:var(--accent); }

  /* ---- Destaque do termo buscado ---- */
  mark{ background:color-mix(in srgb, var(--accent) 26%, transparent); color:inherit;
    border-radius:3px; padding:0 1px; }

  /* ---- Toast ---- */
  .toast{
    position:fixed; left:50%; bottom:calc(20px + env(safe-area-inset-bottom,0));
    transform:translate(-50%,20px); z-index:60; max-width:88%;
    background:var(--ink); color:var(--bg); padding:11px 16px; border-radius:10px;
    font-size:14px; box-shadow:0 6px 24px rgba(0,0,0,.28);
    opacity:0; pointer-events:none; transition:opacity .2s, transform .2s;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  /* ---- Banner "Atualizar" ---- */
  .updbar{
    position:fixed; left:12px; right:12px; bottom:calc(14px + env(safe-area-inset-bottom,0));
    max-width:var(--maxw); margin:0 auto; z-index:60;
    display:flex; align-items:center; gap:12px; justify-content:space-between;
    background:var(--accent); color:#fff; padding:11px 12px 11px 16px; border-radius:12px;
    box-shadow:0 8px 30px rgba(60,45,15,.35);
    transform:translateY(140%); transition:transform .28s ease;
  }
  .updbar.show{ transform:translateY(0); }
  .updbar span{ font-size:14px; }
  .updbar button{
    flex:0 0 auto; cursor:pointer; border:1px solid rgba(255,255,255,.55);
    background:rgba(255,255,255,.14); color:#fff; font-family:inherit; font-weight:700;
    font-size:14px; padding:8px 14px; border-radius:9px;
  }
  .updbar button:active{ background:rgba(255,255,255,.28); }

  /* ---- Impressão ---- */
  @media print{
    :root{ --page:#fff; --bg:#fff; --panel:#fff; --panel-2:#fff; --ink:#000; --ink-soft:#333;
      --line:#ccc; --line-strong:#bbb; }
    header, footer, .actbar, .search, .btn-back, .h-tools{ display:none !important; }
    .app{ max-width:none; border:none !important; box-shadow:none !important; }
    main{ padding:0; }
    .area{ break-inside:avoid; }
    .sec{ break-inside:avoid; }
    a.ext{ color:#000; text-decoration:none; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <button class="btn-back" id="btnBack" aria-label="Voltar"><span class="bk-ico">‹</span><span class="bk-txt">Voltar</span></button>
      <div class="h-title" id="hTitle">
        <div class="t">Magnifique seu Chamado</div>
        <div class="s">Guia de chamados da Ala</div>
      </div>
      <div class="h-tools">
        <button class="tbtn" id="fMinus" aria-label="Diminuir fonte">A−</button>
        <button class="tbtn" id="fPlus" aria-label="Aumentar fonte">A+</button>
        <button class="tbtn" id="themeBtn" aria-label="Alternar tema">☾</button>
      </div>
    </div>
    <input class="search" id="search" type="search" placeholder="Buscar chamado em todas as organizações…" autocomplete="off">
  </header>

  <main id="view"></main>

  <footer id="footer"></footer>
</div>

<script>
/* ==========================================================================
   MAGNIFIQUE SEU CHAMADO — FASE 2
   Design "estilo Liahona". Navegação SPA por estado em memória.
   Estrutura de dados pronta para receber o conteúdo de TODOS os chamados.
   Conteúdo fundamentado no Manual Geral (PT-BR). Nunca nominal (só o cargo).
   ========================================================================== */

const VERSAO = "1.8.0";
const DATA_STR = "22/07/2026";

const slug = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");

/* Helpers de construção -------------------------------------------------- */
// chamado só com título (estrutura pronta p/ receber conteúdo depois)
const t = titulo => ({ titulo });
// chamado com conteúdo completo
const full = (titulo, c) => ({ titulo, c });

/* ---- CONTEÚDO COMPLETO: BISPADO (amostra) ------------------------------ */
const BISPADO = [
  full("Bispo", {
    escritura:{ t:"Apascentai o rebanho de Deus que está entre vós… servindo de exemplo ao rebanho.", r:"1 Pedro 5:2–3" },
    proposito:"O bispo é o presidente da ala e o principal sumo sacerdote presidente. Recebe as chaves do sacerdócio para liderar o trabalho do Senhor na ala, preside o Sacerdócio Aarônico e o quórum de sacerdotes, e serve como juiz comum. Zela pelo bem-estar espiritual e temporal dos membros, com ênfase especial nos jovens e nas crianças.",
    ref:"Manual Geral, 7.1",
    resp:[
      "Presidir a ala e liderar o trabalho de salvação e exaltação por meio do conselho da ala (7.1.4).",
      "Presidir o Sacerdócio Aarônico e o quórum de sacerdotes, concentrando-se nos jovens (7.1.2).",
      "Servir como juiz comum: entrevistas de dignidade, recomendações para o templo e ajuda no arrependimento (7.1.3).",
      "Cuidar dos pobres e necessitados; administrar as ofertas de jejum e os recursos de bem-estar (7.1.4).",
      "Supervisionar registros, finanças e recursos sagrados da ala; aprovar chamados e desobrigações (7.1.5).",
      "Chamar, apoiar e desobrigar membros para servir, e autorizar as ordenações ao Sacerdócio Aarônico.",
      "Zelar pela proteção das crianças e dos jovens, assegurando o cumprimento das normas de segurança.",
      "Presidir a reunião sacramental, o conselho da ala e o comitê de jovens.",
    ],
    areas:[
      { t:"Ministrar como pastor", i:[
        "Reserve um tempo semanal fixo para entrevistas e para ministrar às pessoas.",
        "Procure conhecer pelo nome as famílias, os jovens e as crianças da ala.",
        "Assegure que ninguém fique sem ministros designados; acompanhe pelo conselho.",
        "Visite os doentes, os solitários e os que passam por provações.",
      ]},
      { t:"Fortalecer os jovens", i:[

const ZOOMS = [0.9, 1.0, 1.12, 1.28];
// Tema padrão = preferência do sistema (só no 1º acesso, sem nada salvo).
const temaSistema = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches)
  ? "escuro" : "claro";
let prefs = { tema:temaSistema, zoomIdx:1, favs:[] };
try{
  const raw = localStorage.getItem("mag_prefs");
  if(raw){ const p=JSON.parse(raw);
    if(p.tema) prefs.tema=p.tema;
    if(Number.isInteger(p.zoomIdx)) prefs.zoomIdx=p.zoomIdx;
    if(Array.isArray(p.favs)) prefs.favs=p.favs;
  }
}catch(e){}
function savePrefs(){ try{ localStorage.setItem("mag_prefs", JSON.stringify(prefs)); }catch(e){} }
// Alguns navegadores antigos (iOS < 16.4) ignoram CSS `zoom`; usamos transform como reserva.
const ZOOM_OK = (()=>{ const d=document.createElement("div"); d.style.zoom="2"; return !!d.style.zoom; })();
function applyPrefs(){
  document.documentElement.setAttribute("data-theme", prefs.tema);
  const s = ZOOMS[prefs.zoomIdx];
  if(ZOOM_OK){ document.body.style.zoom = s; }
  else{
    const app = document.querySelector(".app");
    if(app){ app.style.transformOrigin="top center"; app.style.transform = s===1 ? "" : "scale("+s+")"; }
  }
  document.getElementById("themeBtn").textContent = prefs.tema==="escuro" ? "☀" : "☾";
  document.querySelector('meta[name=theme-color]').setAttribute("content",
    prefs.tema==="escuro" ? "#201C15" : "#8B6B3D");
}

let state = { view:"home", orgId:null, chamadoId:null, q:"" };

/* ---- Roteamento por hash (deep links + botão voltar do navegador/celular) ----
   #/                → Home
   #/o/<orgId>       → Organização
   #/c/<chamadoId>   → Detalhe (compartilhável)
   #/b/<termo>       → Busca                                                   */
function stateToHash(s){
  if(s.view==="org")      return "#/o/"+s.orgId;
  if(s.view==="detalhe")  return "#/c/"+s.chamadoId;
  if(s.view==="busca")    return "#/b/"+encodeURIComponent(s.q||"");
  return "#/";
}
function hashToState(){
  const h = location.hash.replace(/^#\/?/,"");
  const seg = h.split("/")[0];
  const arg = h.slice(seg.length+1);
  if(seg==="o" && findOrg(arg))        return { view:"org", orgId:arg };
  if(seg==="c" && findChamado(arg))    return { view:"detalhe", chamadoId:arg };
  if(seg==="b")                        return { view:"busca", q:decodeURIComponent(arg||"") };
  return { view:"home" };
}
/* ==========================================================================
   LINKS PARA O SITE OFICIAL (Manual Geral e escrituras) — churchofjesuschrist.org
   URLs validadas (retornam 200). Numeração de seções liga ao capítulo.
   ========================================================================== */
const norm = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");

const MANUAL_CH = {
  7:"7", 8:"8-elders-quorum", 9:"9-relief-society", 10:"10-aaronic-priesthood",
  11:"11-young-women", 12:"12-primary", 13:"13-sunday-school", 14:"14-single-members",
  16:"16-living-the-gospel", 17:"17-teaching-the-gospel", 18:"18-priesthood-ordinances-and-blessings",
  19:"19-music", 20:"20-activities", 21:"21-ministering", 22:"22-providing-for-temporal-needs",
  23:"23", 25:"25-temple-and-family-history-work", 26:"26-temple-recommends",
  29:"29-meetings-in-the-church", 30:"30-callings-in-the-church",
  32:"32-repentance-and-membership-councils", 33:"33-records-and-reports",
  34:"34-finances-and-audits", 35:"35", 38:"38-church-policies-and-guidelines",
};
function manualUrl(ch){
  return "https://www.churchofjesuschrist.org/study/manual/general-handbook/"
    + (MANUAL_CH[ch] || String(ch)) + "?lang=por";
}
const manualLink = (label,ch)=>`<a class="ext" href="${manualUrl(ch)}" target="_blank" rel="noopener">${label}</a>`;
// Para o campo de referência (só contém números do Manual): liga todos os tokens.
function linkManualRef(text){
  return text.replace(/\d+(?:\.\d+)*/g, tok=>{
    const ch = parseInt(tok,10);
    return (ch>=1 && ch<=38) ? manualLink(tok,ch) : tok;
  });
}
// Para texto corrido (responsabilidades): liga só seções com ponto (7.1.4) e "cap. N",
// evitando idades ("8 anos") e escrituras ("D&C 20:46").
function linkManualInline(text){
  text = text.replace(/\b\d+\.\d+(?:\.\d+)*\b/g, tok=>{
    const ch = parseInt(tok,10);
    return (ch>=1 && ch<=38) ? manualLink(tok,ch) : tok;
  });
  text = text.replace(/cap\.\s*(\d+)/g, (m,n)=>{
    const ch = parseInt(n,10);
    return (ch>=1 && ch<=38) ? "cap. "+manualLink(n,ch) : m;
  });
  return text;
}

const LIVROS = {
  "1 pedro":["nt","1-pet"], "eclesiastes":["ot","eccl"], "mosias":["bofm","mosiah"],
  "1 corintios":["nt","1-cor"], "moroni":["bofm","moro"], "alma":["bofm","alma"],
  "1 timoteo":["nt","1-tim"], "hebreus":["nt","heb"], "marcos":["nt","mark"],
  "malaquias":["ot","mal"], "jeremias":["ot","jer"], "proverbios":["ot","prov"],
  "3 nefi":["bofm","3-ne"], "doutrina e convenios":["dc-testament","dc"],
};
function escrituraUrl(ref){
  const m = ref.match(/^(.+?)\s+(\d+):(\d+)/);
  if(!m) return null;
  const map = LIVROS[norm(m[1]).trim()];
  if(!map) return null;
  return `https://www.churchofjesuschrist.org/study/scriptures/${map[0]}/${map[1]}/${m[2]}?lang=por&id=p${m[3]}#p${m[3]}`;
}
function linkEscrituraRef(ref){
  const u = escrituraUrl(ref);
  return u ? `<a class="ext" href="${u}" target="_blank" rel="noopener">${ref}</a>` : ref;
}

const el = {
  view: document.getElementById("view"),
  back: document.getElementById("btnBack"),
  hT: document.querySelector("#hTitle .t"),
  hS: document.querySelector("#hTitle .s"),
  search: document.getElementById("search"),
  footer: document.getElementById("footer"),
};
function go(next, replace){
  state = { ...state, ...next };
  const hash = stateToHash(state);
  if(replace) history.replaceState(null,"",hash);
  else        history.pushState(null,"",hash);
  render();
  if(!replace) window.scrollTo(0,0);
}
window.addEventListener("popstate", ()=>{
  state = { ...state, ...hashToState() };
  render(); window.scrollTo(0,0);
});
function setHeader(t2, s2){ el.hT.textContent=t2; el.hS.textContent=s2||""; }
function setOrgColor(cor){ document.documentElement.style.setProperty("--org", cor || "var(--accent)"); }

function render(){
  el.footer.textContent = `v${VERSAO} · ${DATA_STR} · © 2026 Léo Lucas · Todos os direitos reservados`;
  // Mantém o campo de busca em sincronia com o estado (importante ao voltar/deep-link).
  const focado = document.activeElement===el.search;
  if(state.view==="busca"){
    if(!focado && el.search.value.trim()!==state.q) el.search.value = state.q;
    el.back.style.display="none"; setOrgColor(null);
    return renderBusca(state.q);
  }
  if(!focado && el.search.value) el.search.value="";
  if(state.view==="org") return renderOrg();
  if(state.view==="detalhe") return renderDetalhe();
  return renderHome();
}

    ? `<div class="escr"><span class="qm">“</span>${c.c.escritura.t}”<span class="ref">— ${linkEscrituraRef(c.c.escritura.r)}</span></div>` : "";
  if(c.foto){

  } else {
    cover.innerHTML=`<span class="kicker">${kicker}</span>
      <h2>${c.titulo}</h2>${escrHtml}`;
  }

  wrap.appendChild(buildActbar(c));

  if(!c.c){
    wrap.appendChild(node(`<div class="prep"><b>Conteúdo em preparação.</b><br>
      A estrutura deste chamado já está pronta e será preenchida em breve,
      com base no <i>Manual Geral</i>.</div>`));
    el.view.appendChild(wrap); return;
  }

  const d = c.c;
  // Propósito
  const sp = section("Propósito","◈","proposito");
  sp.appendChild(node(`<p>${d.proposito}</p>`));
  if(d.ref) sp.appendChild(node(`<span class="ref-tag"><span class="ic">📖</span><span>${linkManualRef(d.ref)}</span></span>`));
  wrap.appendChild(sp);

  // Responsabilidades

  d.resp.forEach(r=>{ const li=document.createElement("li"); li.innerHTML=linkManualInline(r); ul.appendChild(li); });
  sr.appendChild(ul); wrap.appendChild(sr);

  // Como magnificar (5 áreas)

    a.i.forEach(x=>{ const li=document.createElement("li"); li.textContent=x; uli.appendChild(li); });
    box.appendChild(uli); sm.appendChild(box);
  });
  wrap.appendChild(sm);

  // Fechamento
  const sf=section("Fechamento","❧");
  sf.appendChild(node(`<div class="fecho"><p>${d.fecho.t}</p><span class="fonte">Fonte: ${linkManualRef(d.fecho.f)}</span></div>`));
  wrap.appendChild(sf);

  el.view.appendChild(wrap);
}

  const nq = slug(q);
  if(!nq){ el.view.appendChild(hint("Digite para buscar em todas as organizações.")); return; }
  const res = INDEX.filter(c=>slug(c.titulo).includes(nq) || slug(c.orgNome).includes(nq));
  if(!res.length){
    // textContent evita injeção de HTML pelo termo digitado.
    const d=document.createElement("div"); d.className="empty";
    d.textContent="Nenhum chamado encontrado para “"+q+"”.";
    el.view.appendChild(d); return;
  }
  el.view.appendChild(hint(`${res.length} resultado${res.length!==1?"s":""}.`));
  el.view.appendChild(listWrap(res.map(c=>{
    const org=findOrg(c.orgId);
    const sub=c.orgNome+(c.grupo? " · "+c.grupo : "");
    return card(c.orgIcone, c.titulo, sub, org.cor,
      ()=>go({view:"detalhe",orgId:c.orgId,chamadoId:c.id}), false, q);
  })));
}

/* ---- Helpers de UI ---- */
function card(ico, titulo, sub, cor, onClick, plainIco, hlQuery){
  const b=document.createElement("button"); b.className="card";
  if(cor) b.style.setProperty("--org", cor);
  b.innerHTML=`<span class="ico">${ico}</span>
    <span class="txt"><span class="t"></span>${sub?'<span class="s"></span>':''}</span>
    <span class="chev">›</span>`;
  const tEl=b.querySelector(".t");
  if(hlQuery) highlightInto(tEl, titulo, hlQuery); else tEl.textContent=titulo;
  if(sub) b.querySelector(".s").textContent=sub;
  if(plainIco){ const ic=b.querySelector(".ico"); ic.style.background="transparent"; ic.style.border="none"; ic.style.color="var(--accent-soft)"; }
  b.onclick=onClick; return b;
}
// Destaca o termo no texto (sem acento/caixa), montando nós de texto + <mark> com segurança.
function foldArr(s){ return Array.from(s).map(c=>(c.normalize("NFD")[0]||c).toLowerCase()); }
function highlightInto(elm, text, q){
  elm.textContent="";
  const raw=Array.from(text), hay=foldArr(text).join(""), needle=foldArr((q||"").trim()).join("");
  if(!needle){ elm.textContent=text; return; }
  let from=0, idx;
  while((idx=hay.indexOf(needle, from))!==-1){
    if(idx>from) elm.appendChild(document.createTextNode(raw.slice(from,idx).join("")));
    const m=document.createElement("mark"); m.textContent=raw.slice(idx, idx+needle.length).join("");
    elm.appendChild(m);
    from=idx+needle.length;
  }
  if(from<raw.length) elm.appendChild(document.createTextNode(raw.slice(from).join("")));
}

/* ---- Barra de ações do detalhe: Favoritar / Compartilhar / Imprimir ---- */
function buildActbar(c){
  const bar=document.createElement("div"); bar.className="actbar";
  const favBtn=document.createElement("button");
  const paintFav=()=>{
    const on=isFav(c.id);
    favBtn.className = on ? "on" : "";
    favBtn.innerHTML = `<span class="ai">${on?"★":"☆"}</span><span>${on?"Favorito":"Favoritar"}</span>`;
  };
  paintFav();
  favBtn.onclick=()=>{ toggleFav(c.id); paintFav(); toast(isFav(c.id)?"Adicionado aos favoritos.":"Removido dos favoritos."); };

  const shBtn=document.createElement("button");
  shBtn.innerHTML=`<span class="ai">↗</span><span>Compartilhar</span>`;
  shBtn.onclick=()=>shareChamado(c);

  const prBtn=document.createElement("button");
  prBtn.innerHTML=`<span class="ai">🖨</span><span>Imprimir</span>`;
  prBtn.onclick=()=>window.print();

  bar.append(favBtn, shBtn, prBtn);
  return bar;
}
function chamadoUrl(c){ return location.origin+location.pathname+"#/c/"+c.id; }
function shareChamado(c){
  const url=chamadoUrl(c);
  const data={ title:"Magnifique seu Chamado — "+c.titulo, text:c.titulo+" · "+c.orgNome, url };
  if(navigator.share){ navigator.share(data).catch(()=>{}); return; }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>toast("Link copiado!"), ()=>toast(url));
  } else { toast(url); }
}
let toastTimer;
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg;
  requestAnimationFrame(()=>t.classList.add("show"));
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 2600);
}
function listWrap(cards){ const d=document.createElement("div"); d.className="list"; cards.forEach(c=>d.appendChild(c)); return d; }
function section(titulo, icon, cls){
  const s=document.createElement("div"); s.className="sec"+(cls?" "+cls:"");
  const h=document.createElement("h3");
  h.innerHTML=(icon?`<span class="ic">${icon}</span>`:"")+`<span class="lbl"></span>`;
  h.querySelector(".lbl").textContent=titulo;
  s.appendChild(h); return s;
}
function hint(txt){ const p=document.createElement("p"); p.className="hint"; p.textContent=txt; return p; }
function node(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstElementChild; }

/* ---- Eventos ---- */
el.search.addEventListener("input", ()=>{
  const q=el.search.value.trim();
  // Empurra 1 entrada no histórico ao iniciar a busca; digitar depois só substitui.
  if(q) go({view:"busca", q}, state.view==="busca");
  else if(state.view==="busca") go({view:"home"}, true);
});
document.getElementById("themeBtn").onclick=()=>{ prefs.tema = prefs.tema==="escuro"?"claro":"escuro"; applyPrefs(); savePrefs(); };
document.getElementById("fPlus").onclick=()=>{ if(prefs.zoomIdx<ZOOMS.length-1){ prefs.zoomIdx++; applyPrefs(); savePrefs(); } };
document.getElementById("fMinus").onclick=()=>{ if(prefs.zoomIdx>0){ prefs.zoomIdx--; applyPrefs(); savePrefs(); } };

/* ---- Banner "Atualizar" quando há nova versão ---- */
function showUpdateBanner(reg){
  if(document.getElementById("updBanner")) return;
  const b=document.createElement("div"); b.id="updBanner"; b.className="updbar";
  b.innerHTML=`<span>Nova versão disponível.</span><button type="button">Atualizar</button>`;
  b.querySelector("button").onclick=()=>{
    if(reg.waiting) reg.waiting.postMessage({type:"SKIP_WAITING"});
  };
  document.body.appendChild(b);
  requestAnimationFrame(()=>b.classList.add("show"));
}

/* ---- Service Worker ---- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").then(reg=>{
      if(reg.waiting) showUpdateBanner(reg);
      reg.addEventListener("updatefound", ()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener("statechange", ()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateBanner(reg);
        });
      });
    }).catch(()=>{});
    let recarregando=false;
    navigator.serviceWorker.addEventListener("controllerchange", ()=>{
      if(recarregando) return; recarregando=true; location.reload();
    });
  });
}

/* ---- Inicialização do roteador (semeia a Home como base p/ deep links) ---- */
(function initRouter(){
  const inicial = hashToState();
  history.replaceState(null,"","#/");
  if(inicial.view!=="home") history.pushState(null,"", stateToHash(inicial));
  state = { ...state, ...inicial };
  if(inicial.view==="busca") el.search.value = inicial.q;
})();

applyPrefs();
render();
</script>
